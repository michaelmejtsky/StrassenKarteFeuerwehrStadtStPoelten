<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infoscreen</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,Helvetica,sans-serif;
}

iframe{
position:absolute;
inset:0;
width:100%;
height:100%;
border:none;
display:block;
background:#000;
}

#offlineFallback{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,#10235a 0%,#07152f 55%,#020816 100%);
z-index:999999;
}

.offlineCard{

width:760px;
max-width:80vw;

padding:55px;

border-radius:22px;

background:rgba(5,17,45,.82);

border:2px solid rgba(0,234,255,.45);

box-shadow:
0 0 30px rgba(0,234,255,.25),
0 0 90px rgba(0,234,255,.15);

text-align:center;

color:white;

}

.logo{

width:105px;
margin-bottom:28px;

filter:drop-shadow(0 0 15px rgba(0,234,255,.45));

}

.title{

font-size:37px;
font-weight:800;
color:#00eaff;
margin-bottom:18px;

}

.subtitle{

font-size:27px;
font-weight:700;
margin-bottom:22px;

}

.info{

font-size:18px;
opacity:.9;

margin-bottom:30px;

}

.spinner{

margin:auto;

width:42px;
height:42px;

border-radius:50%;

border:5px solid rgba(255,255,255,.25);
border-top:5px solid #00eaff;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

.last{

margin-top:26px;

font-size:14px;

opacity:.75;

}

</style>

</head>

<body>

<iframe
id="infoscreenFrame"
src="https://script.google.com/a/macros/feuerwehr-stpoelten.at/s/AKfycbycKW54MsrXZAgrM4h4dqOnbcbuyw-icOU2WT94aS7a0TOf6Y-nkUfhpDrE3UHxThKR/exec">
</iframe>


<div id="offlineFallback">

<div class="offlineCard">

<img
class="logo"
src="https://drive.google.com/thumbnail?id=11OnUfELMcLBj_VPiqKXqu1nIAZHXg_Pb&sz=w400">

<div class="title">

Derzeit gibt es Verbindungsschwierigkeiten.

</div>

<div class="subtitle">

Wir arbeiten bereits an der Problembehebung.

</div>

<div class="info">

Die Anzeige wird automatisch wiederhergestellt,
sobald die Verbindung verfügbar ist.

</div>

<div class="spinner"></div>

<div
class="last"
id="lastConnection">
Letzte erfolgreiche Verbindung:
wird ermittelt...
</div>

</div>

</div>


<script>

const APP_URL="https://script.google.com/a/macros/feuerwehr-stpoelten.at/s/AKfycbycKW54MsrXZAgrM4h4dqOnbcbuyw-icOU2WT94aS7a0TOf6Y-nkUfhpDrE3UHxThKR/exec";

const frame=document.getElementById("infoscreenFrame");

const offline=document.getElementById("offlineFallback");

const last=document.getElementById("lastConnection");

let offlineTest=false;

let lastSuccess=new Date();

function updateTime(){

last.innerHTML=
"Letzte erfolgreiche Verbindung:<br>"+
lastSuccess.toLocaleString("de-AT")+" Uhr";

}

updateTime();

function showOffline(){

offline.style.display="flex";

updateTime();

}

function hideOffline(){

if(offlineTest)return;

offline.style.display="none";

lastSuccess=new Date();

updateTime();

}

frame.onload=()=>{

setTimeout(hideOffline,1000);

};

window.addEventListener("offline",showOffline);

window.addEventListener("online",()=>{

frame.src=APP_URL+"?r="+Date.now();

setTimeout(hideOffline,2500);

});

setInterval(()=>{

if(!navigator.onLine){

showOffline();

}

},4000);

setInterval(()=>{

if(!offlineTest&&navigator.onLine){

frame.src=APP_URL+"?reload="+Date.now();

}

},60000);

const p=new URLSearchParams(location.search);

if(p.has("offline")){

offlineTest=true;

showOffline();

}

document.addEventListener("keydown",e=>{

if(e.ctrlKey&&e.altKey&&e.key.toLowerCase()=="o"){

offlineTest=!offlineTest;

if(offlineTest){

showOffline();

}else{

hideOffline();

}

}

});

</script>

</body>
</html>
